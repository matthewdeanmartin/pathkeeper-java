# ---------------------------------------------------------------------------
# Programming Languages
# ---------------------------------------------------------------------------

[[tools]]
name = "Python"
category = "Programming Languages"
os = "windows"
executables = ["python", "python3"]
patterns = [
  "C:\\Python3*",
  "C:\\Python3*\\Scripts",
  "%LOCALAPPDATA%\\Programs\\Python\\Python3*",
  "%LOCALAPPDATA%\\Programs\\Python\\Python3*\\Scripts",
  "%APPDATA%\\Python\\Python3*\\Scripts",
  "%USERPROFILE%\\scoop\\apps\\python\\current",
  "%USERPROFILE%\\scoop\\apps\\python\\current\\Scripts",
  "%LOCALAPPDATA%\\Microsoft\\WindowsApps",
]

[[tools]]
name = "Node.js"
category = "Programming Languages"
os = "all"
executables = ["node"]
patterns = [
  "%ProgramFiles%\\nodejs",
  "%ProgramFiles(x86)%\\nodejs",
  "%APPDATA%\\nvm\\v*",
  "%USERPROFILE%\\scoop\\apps\\nodejs\\current",
  "/usr/local/bin",
  "$HOME/.nvm/versions/node/*/bin",
]

[[tools]]
name = "Go"
category = "Programming Languages"
os = "all"
executables = ["go"]
patterns = [
  "%ProgramFiles%\\Go\\bin",
  "%ProgramW6432%\\Go\\bin",
  "C:\\Go\\bin",
  "%USERPROFILE%\\scoop\\apps\\go\\current\\bin",
  "%USERPROFILE%\\go\\bin",
  "/usr/local/go/bin",
  "$HOME/go/bin",
]

[[tools]]
name = "Rust"
category = "Programming Languages"
os = "all"
executables = ["cargo", "rustc"]
patterns = [
